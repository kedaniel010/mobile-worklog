<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <title>工作记录助手</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Mobile Work Log</p>
        <h1>工作记录助手</h1>
        <p>不花钱也能在手机上记工作、改进度、查未完成。数据默认保存在当前手机浏览器本地。</p>
      </div>
      <button id="installButton" class="ghost-button hidden" type="button">加到桌面</button>
    </header>

    <section class="stats-grid">
      <article class="stat-card">
        <span>全部记录</span>
        <strong id="totalCount">0</strong>
      </article>
      <article class="stat-card">
        <span>未完成</span>
        <strong id="pendingCount">0</strong>
      </article>
      <article class="stat-card">
        <span>已完成</span>
        <strong id="completedCount">0</strong>
      </article>
      <article class="stat-card">
        <span>高优先级</span>
        <strong id="highCount">0</strong>
      </article>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>快速记录</h2>
        <button id="seedButton" class="text-button" type="button">填充示例</button>
      </div>
      <form id="taskForm" class="task-form">
        <input type="hidden" id="taskId">

        <label>
          工作内容
          <input id="titleInput" type="text" maxlength="60" placeholder="例如：跟进客户合同审批" required>
        </label>

        <label>
          补充说明
          <textarea id="detailInput" rows="3" maxlength="200" placeholder="补充背景、下一步动作、风险点"></textarea>
        </label>

        <div class="field-row">
          <label>
            优先级
            <select id="priorityInput">
              <option value="high">高优先级</option>
              <option value="medium" selected>中优先级</option>
              <option value="low">低优先级</option>
            </select>
          </label>

          <label>
            状态
            <select id="statusInput">
              <option value="pending" selected>未完成</option>
              <option value="completed">已完成</option>
            </select>
          </label>
        </div>

        <label>
          提醒时间
          <input id="remindAtInput" type="datetime-local">
        </label>

        <div class="form-actions">
          <button id="saveButton" class="primary-button" type="submit">保存记录</button>
          <button id="resetButton" class="ghost-button" type="reset">清空</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>备份与恢复</h2>
        <button id="backupButton" class="text-button" type="button">导出备份</button>
      </div>

      <div class="backup-box">
        <p class="backup-copy">建议你定期导出一个备份文件。以后就算换浏览器、清缓存，仍然可以重新导入恢复。</p>
        <div class="backup-actions">
          <label class="import-label">
            <span>导入恢复</span>
            <input id="importInput" type="file" accept=".json,application/json">
          </label>
          <button id="replaceButton" class="ghost-button" type="button">用示例覆盖当前数据</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>任务列表</h2>
        <button id="exportButton" class="text-button" type="button">导出 CSV</button>
      </div>

      <input id="searchInput" class="search-input" type="search" placeholder="搜索标题、备注或提醒时间">

      <div class="filter-row">
        <button class="filter-chip active" data-filter="all" type="button">全部</button>
        <button class="filter-chip" data-filter="pending" type="button">未完成</button>
        <button class="filter-chip" data-filter="completed" type="button">已完成</button>
        <button class="filter-chip" data-filter="high" type="button">高优先级</button>
        <button class="filter-chip" data-filter="reminder" type="button">已设提醒</button>
      </div>

      <div id="taskList" class="task-list"></div>
      <p id="emptyState" class="empty-state">还没有记录，先新增一条任务吧。</p>
    </section>
  </div>

  <template id="taskTemplate">
    <article class="task-card">
      <div class="task-top">
        <div>
          <p class="task-id"></p>
          <h3 class="task-title"></h3>
        </div>
        <div class="badge-stack">
          <span class="priority-badge"></span>
          <span class="status-badge"></span>
        </div>
      </div>
      <p class="task-detail"></p>
      <div class="task-meta"></div>
      <div class="task-actions">
        <button class="small-button edit-button" type="button">编辑</button>
        <button class="small-button toggle-button" type="button"></button>
        <button class="small-button delete-button danger-text" type="button">删除</button>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
