<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <title>工作记录助手</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <section id="authScreen" class="auth-screen">
      <div class="auth-card">
        <p class="eyebrow">Simple Work Log</p>
        <h1>工作记录助手</h1>
        <p class="auth-copy">先登录一次，之后手机和电脑会自动同步同一份工作记录。正常情况下不用每次重新登录。</p>
        <div class="sync-box">
          <div class="sync-form">
            <input id="emailInput" type="email" placeholder="输入你的常用邮箱">
            <button id="sendMagicLinkButton" class="primary-button" type="button">发送登录链接</button>
          </div>
          <p id="authStatus" class="form-hint">先完成登录，再进入记录页面。</p>
        </div>
      </div>
    </section>

    <div id="appContent" class="hidden">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Simple Work Log</p>
          <h1>工作记录助手</h1>
          <p>登录后直接记录，先看未完成，手机和电脑自动同步。</p>
        </div>
        <button id="installButton" class="ghost-button hidden" type="button">加到桌面</button>
      </header>

      <section class="panel quick-panel">
        <div class="panel-head">
          <h2>快速记录</h2>
        </div>
        <form id="taskForm" class="task-form">
          <input type="hidden" id="taskId">

          <label>
            工作内容
            <input id="titleInput" type="text" maxlength="80" placeholder="例如：跟进客户报价" required>
          </label>

          <p class="form-hint quick-hint">直接输入新增任务，输入“完成 空格 关键词”可自动标记完成。</p>

          <div class="form-actions">
            <button id="saveButton" class="primary-button" type="submit">保存记录</button>
            <button id="resetButton" class="ghost-button" type="reset">清空</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>记录列表</h2>
        </div>

        <input id="searchInput" class="search-input" type="search" placeholder="搜索工作内容">

        <div class="filter-row">
          <button class="filter-chip active" data-filter="pending" type="button">未完成</button>
          <button class="filter-chip" data-filter="completed" type="button">已完成</button>
          <button class="filter-chip" data-filter="all" type="button">全部</button>
        </div>

        <div id="taskList" class="task-list"></div>
        <p id="emptyState" class="empty-state">还没有记录，先新增一条吧。</p>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>今日总结</h2>
        </div>
        <div class="summary-box">
          <p id="summaryIntro" class="summary-intro"></p>
          <ul id="summaryList" class="summary-list"></ul>
          <p id="summaryEmpty" class="form-hint">今天还没有已完成任务，等你完成任务后，这里会自动生成总结。</p>
        </div>
      </section>

      <section class="session-bar">
        <p id="sessionText" class="session-text"></p>
        <button id="signOutButton" class="ghost-button session-button" type="button">退出登录</button>
      </section>
    </div>
  </div>

  <template id="taskTemplate">
    <article class="task-card">
      <div class="task-row">
        <h3 class="task-title"></h3>
        <div class="task-inline-actions">
          <button class="mini-button edit-button" type="button">编辑</button>
          <button class="mini-button toggle-button" type="button"></button>
        </div>
      </div>
    </article>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
